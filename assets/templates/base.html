<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Benson{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', path='css/ivoa-theme.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', path='css/common.css') }}"/>
  {% block styles %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="/">
        <img
          class="site-logo"
          src="{{ url_for('static', path='images/ivoa_logo.png') }}"
          width="238"
          height="129"
          alt="International Virtual Observatory Alliance"
        />
        <span class="site-brand-text">
          <span class="site-title">Registry of Registries</span>
          <span class="site-subtitle">International Virtual Observatory Alliance</span>
        </span>
      </a>
    </div>
  </header>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
